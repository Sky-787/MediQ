name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'Backend/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'Backend/**'

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Backend

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './Backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests with Coverage
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/mediq_test
          JWT_SECRET: supersecret_test_key_12345
        run: npm run test:coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: Backend/coverage/
          retention-days: 30

      - name: Trigger Render Backend Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK || secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$DEPLOY_HOOK"
          else
            echo "No backend deploy hook configured; skipping deploy trigger."
          fi
