name: Frontend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: ./Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './Frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Install Linux Rollup binary
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Run ESLint
        run: npm run lint

      - name: Run Build
        run: npm run build

      - name: Run Unit Tests
        run: npm run test:coverage

      - name: Install Backend dependencies
        run: npm ci
        working-directory: ./Backend

      - name: Seed Database
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/mediq_test
          JWT_SECRET: supersecret_test_key_12345
        run: npm run seed
        working-directory: ./Backend

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E Tests
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/mediq_test
          JWT_SECRET: supersecret_test_key_12345
          PORT: 5001
        run: npm run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 30

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: Frontend/coverage/
          retention-days: 30

      - name: Trigger Render Frontend Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK || secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$DEPLOY_HOOK"
          else
            echo "No frontend deploy hook configured; skipping deploy trigger."
          fi
